<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakım Çalışması | EBA Sistem</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🌱</text></svg>">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      /* Kurumsal tarım yeşili degrade arka plan */
      background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 100%);
      color: white;
      text-align: center;
    }

    .icon {
      font-size: 70px;
      margin-bottom: 10px;
      /* Yaprağa hafif bir nefes alma efekti veriyoruz */
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: 38px;
      margin: 0 0 15px 0;
      font-weight: 800;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    p {
      font-size: 18px;
      max-width: 500px;
      line-height: 1.6;
      color: #d8f3dc;
      padding: 0 20px;
      margin-bottom: 30px;
    }

    /* Şık dönen yükleme halkası */
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #74c69d;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      animation: spin 1s linear infinite;
    }

    /* Animasyon komutları */
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
    @keyframes pulse { 
      0% { transform: scale(1); } 
      50% { transform: scale(1.1); } 
      100% { transform: scale(1); } 
    }
  </style>
</head>
<body>

  <div class="icon">🌱</div>
  <h1>EBA Sistem Bakımda</h1>
  <p>Altyapımızı daha da güçlendirmek ve yeni modülleri entegre etmek için kısa süreli bir güncelleme çalışması yapıyoruz. Sistemimiz çok yakında devrede olacaktır.</p>
  <div class="loader"></div>

</body>
</html>
